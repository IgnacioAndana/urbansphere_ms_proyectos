services:
  ms-projects:
    build: .
    container_name: ms-projects
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      DB_HOST: mysql-projects
      DB_PORT: 3306
      DB_NAME: porsusde_urbansphere
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: urbansphere-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_S3_BUCKET: urbansphere
    depends_on:
      mysql-projects:
        condition: service_healthy
    networks:
      - urbansphere-network

  mysql-projects:
    image: mysql:8.0
    container_name: mysql-projects
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: porsusde_urbansphere
    ports:
      - '3308:3306'
    volumes:
      - mysql-projects-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urbansphere-network

volumes:
  mysql-projects-data:

networks:
  urbansphere-network:
    driver: bridge
